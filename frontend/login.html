<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — TimeSync</title>
    <meta name="description" content="Sign in to TimeSync to manage overtime requests, approvals, and payroll timesheets.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .input-field {
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .input-field:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }
        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.35);
        }
        .btn-primary:active { transform: translateY(0); }
        .fade-in {
            animation: fadeInUp 0.5s ease-out both;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        /* Floating orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            pointer-events: none;
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center px-4 relative overflow-hidden">

    <!-- Decorative orbs -->
    <div class="orb w-96 h-96 bg-indigo-500 -top-32 -left-32" style="position:absolute;"></div>
    <div class="orb w-80 h-80 bg-purple-600 bottom-0 right-0" style="position:absolute;"></div>

    <div class="w-full max-w-md fade-in" style="animation-delay: 0.1s;">

        <!-- Branding -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-indigo-500/20 border border-indigo-500/30 mb-4">
                <svg class="w-7 h-7 text-indigo-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6l4 2m6-2a10 10 0 11-20 0 10 10 0 0120 0z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-tight">Welcome back</h1>
            <p class="text-slate-400 text-sm mt-1">Sign in to your TimeSync account</p>
        </div>

        <!-- Login Card -->
        <div class="glass-card rounded-2xl p-8">
            <form id="loginForm" class="space-y-5">
                <div>
                    <label for="username" class="block text-sm font-medium text-slate-300 mb-1.5">Username</label>
                    <input
                        id="username"
                        name="username"
                        type="text"
                        required
                        autocomplete="username"
                        class="input-field w-full rounded-xl border border-white/10 bg-white/5 text-white placeholder-slate-500 px-4 py-3 text-sm outline-none"
                        placeholder="Enter your username"
                    >
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
                    <input
                        id="password"
                        name="password"
                        type="password"
                        required
                        autocomplete="current-password"
                        class="input-field w-full rounded-xl border border-white/10 bg-white/5 text-white placeholder-slate-500 px-4 py-3 text-sm outline-none"
                        placeholder="Enter your password"
                    >
                </div>
                <button
                    id="loginBtn"
                    type="submit"
                    class="btn-primary w-full text-white font-semibold py-3 rounded-xl text-sm flex items-center justify-center gap-2"
                >
                    <span id="loginBtnText">Sign In</span>
                    <svg id="loginSpinner" class="hidden animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                </button>
            </form>

            <div class="mt-6 text-center">
                <span class="text-slate-500 text-sm">Don't have an account?</span>
                <a href="signup.html" class="text-indigo-400 hover:text-indigo-300 text-sm font-medium ml-1 transition-colors">Create one</a>
            </div>
        </div>

        <p class="text-center text-slate-600 text-xs mt-6">&copy; 2026 TimeSync. All rights reserved.</p>
    </div>

    <script src="js/toast.js?v=2"></script>
    <script src="js/auth.js?v=2"></script>
    <script src="js/services.js?v=2"></script>
    <script>
        (function () {
            'use strict';

            /* If already logged in, redirect to dashboard */
            if (window.auth.isAuthenticated()) {
                var user = window.auth.getUser();
                if (user && user.role) {
                    window.location.href = window.auth.getDashboardPath(user.role);
                    return;
                }
            }

            var form = document.getElementById('loginForm');
            var btnText = document.getElementById('loginBtnText');
            var spinner = document.getElementById('loginSpinner');
            var btn = document.getElementById('loginBtn');

            form.addEventListener('submit', async function (e) {
                e.preventDefault();

                var username = document.getElementById('username').value.trim();
                var password = document.getElementById('password').value;

                if (!username || !password) {
                    showToast('Please fill in all fields.', 'warning');
                    return;
                }

                /* Show loading state */
                btn.disabled = true;
                btnText.textContent = 'Signing in…';
                spinner.classList.remove('hidden');

                try {
                    if (!window.api || typeof window.api.login !== 'function') {
                        throw new Error('API module failed to load. Please refresh the page.');
                    }

                    var result = await window.api.login(username, password);

                    if (result.success) {
                        showToast('Login successful! Redirecting…', 'success');
                        var role = result.data.user.role;
                        setTimeout(function () {
                            window.location.href = window.auth.getDashboardPath(role);
                        }, 600);
                        return; // Keep button in loading state during redirect
                    } else {
                        showToast(result.error || 'Login failed.', 'error');
                    }
                } catch (err) {
                    console.error('[TimeSync] Login form error:', err);
                    var msg = (err && err.message) ? err.message : 'An unexpected error occurred.';
                    if (typeof showToast === 'function') {
                        showToast(msg, 'error');
                    } else {
                        alert('Login error: ' + msg);
                    }
                }

                /* Reset button on failure */
                btn.disabled = false;
                btnText.textContent = 'Sign In';
                spinner.classList.add('hidden');
            });
        })();
    </script>
</body>
</html>
