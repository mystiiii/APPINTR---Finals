<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — TimeSync</title>
    <meta name="description" content="Sign in to TimeSync to manage overtime requests, approvals, and payroll timesheets.">
    <script src="js/theme.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/theme.css">
</head>
<body class="min-h-screen flex items-center justify-center px-4 relative overflow-hidden">

    <!-- Theme Toggle (top-right) -->
    <div class="fixed top-4 right-4 z-50">
        <button onclick="window.tsTheme.toggle()" class="theme-toggle" aria-label="Toggle theme">
            <svg class="icon-sun" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m8.66-13.66l-.71.71M4.05 19.95l-.71.71M21 12h-1M4 12H3m16.66 7.66l-.71-.71M4.05 4.05l-.71-.71M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
            <svg class="icon-moon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        </button>
    </div>

    <div class="w-full max-w-md fade-in" style="animation-delay: 0.1s;">

        <!-- Branding -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl mb-4" style="background: var(--color-accent-bg); border: 1px solid var(--color-accent-border);">
                <svg class="w-7 h-7" style="color: var(--color-accent-text);" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6l4 2m6-2a10 10 0 11-20 0 10 10 0 0120 0z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold tracking-tight ts-text-primary">Welcome back</h1>
            <p class="ts-text-muted text-sm mt-1">Sign in to your TimeSync account</p>
        </div>

        <!-- Login Card -->
        <div class="ts-card p-8">
            <form id="loginForm" class="space-y-5">
                <div>
                    <label for="username" class="block text-sm font-medium ts-text-secondary mb-1.5">Username</label>
                    <input
                        id="username"
                        name="username"
                        type="text"
                        required
                        autocomplete="username"
                        class="ts-input w-full rounded-xl px-4 py-3 text-sm"
                        placeholder="Enter your username"
                    >
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium ts-text-secondary mb-1.5">Password</label>
                    <input
                        id="password"
                        name="password"
                        type="password"
                        required
                        autocomplete="current-password"
                        class="ts-input w-full rounded-xl px-4 py-3 text-sm"
                        placeholder="Enter your password"
                    >
                </div>
                <button
                    id="loginBtn"
                    type="submit"
                    class="ts-btn-primary w-full font-semibold py-3 rounded-xl text-sm flex items-center justify-center gap-2"
                >
                    <span id="loginBtnText">Sign In</span>
                    <svg id="loginSpinner" class="hidden animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                </button>
            </form>

            <div class="mt-6 text-center">
                <span class="ts-text-faint text-sm">Don't have an account?</span>
                <a href="signup.html" class="text-sm font-medium ml-1 transition-colors" style="color: var(--color-accent-text);">Create one</a>
            </div>
        </div>

        <p class="text-center ts-text-footer text-xs mt-6">&copy; 2026 TimeSync. All rights reserved.</p>
    </div>

    <script src="js/toast.js?v=3"></script>
    <script src="js/auth.js?v=3"></script>
    <script src="js/services.js?v=3"></script>
    <script>
        (function () {
            'use strict';

            /* If already logged in, redirect to dashboard */
            if (window.auth.isAuthenticated()) {
                var user = window.auth.getUser();
                if (user && user.role) {
                    window.location.href = window.auth.getDashboardPath(user.role);
                    return;
                }
            }

            var form = document.getElementById('loginForm');
            var btnText = document.getElementById('loginBtnText');
            var spinner = document.getElementById('loginSpinner');
            var btn = document.getElementById('loginBtn');

            form.addEventListener('submit', async function (e) {
                e.preventDefault();

                var username = document.getElementById('username').value.trim();
                var password = document.getElementById('password').value;

                if (!username || !password) {
                    showToast('Please fill in all fields.', 'warning');
                    return;
                }

                /* Show loading state */
                btn.disabled = true;
                btnText.textContent = 'Signing in…';
                spinner.classList.remove('hidden');

                try {
                    if (!window.api || typeof window.api.login !== 'function') {
                        throw new Error('API module failed to load. Please refresh the page.');
                    }

                    var result = await window.api.login(username, password);

                    if (result.success) {
                        showToast('Login successful! Redirecting…', 'success');
                        var role = result.data.user.role;
                        setTimeout(function () {
                            window.location.href = window.auth.getDashboardPath(role);
                        }, 600);
                        return; // Keep button in loading state during redirect
                    } else {
                        showToast(result.error || 'Login failed.', 'error');
                    }
                } catch (err) {
                    console.error('[TimeSync] Login form error:', err);
                    var msg = (err && err.message) ? err.message : 'An unexpected error occurred.';
                    if (typeof showToast === 'function') {
                        showToast(msg, 'error');
                    } else {
                        alert('Login error: ' + msg);
                    }
                }

                /* Reset button on failure */
                btn.disabled = false;
                btnText.textContent = 'Sign In';
                spinner.classList.add('hidden');
            });
        })();
    </script>
</body>
</html>
