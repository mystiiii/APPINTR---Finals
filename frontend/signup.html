<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — TimeSync</title>
    <meta name="description" content="Create a new TimeSync account to start managing overtime requests and payroll timesheets.">
    <script src="js/theme.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/theme.css">
</head>
<body class="min-h-screen flex items-center justify-center px-4 py-12 relative overflow-hidden">

    <!-- Theme Toggle (top-right) -->
    <div class="fixed top-4 right-4 z-50">
        <button onclick="window.tsTheme.toggle()" class="theme-toggle" aria-label="Toggle theme">
            <svg class="icon-sun" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m8.66-13.66l-.71.71M4.05 19.95l-.71.71M21 12h-1M4 12H3m16.66 7.66l-.71-.71M4.05 4.05l-.71-.71M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
            <svg class="icon-moon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        </button>
    </div>

    <div class="w-full max-w-md fade-in" style="animation-delay: 0.1s;">

        <!-- Branding -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl mb-4" style="background: var(--color-accent-bg); border: 1px solid var(--color-accent-border);">
                <svg class="w-7 h-7" style="color: var(--color-accent-text);" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold tracking-tight ts-text-primary">Create your account</h1>
            <p class="ts-text-muted text-sm mt-1">Join TimeSync and start tracking overtime</p>
        </div>

        <!-- Signup Card -->
        <div class="ts-card p-8">
            <form id="signupForm" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="firstName" class="block text-sm font-medium ts-text-secondary mb-1.5">First Name</label>
                        <input id="firstName" type="text" required
                            class="ts-input w-full rounded-xl px-4 py-3 text-sm"
                            placeholder="John">
                    </div>
                    <div>
                        <label for="lastName" class="block text-sm font-medium ts-text-secondary mb-1.5">Last Name</label>
                        <input id="lastName" type="text" required
                            class="ts-input w-full rounded-xl px-4 py-3 text-sm"
                            placeholder="Doe">
                    </div>
                </div>
                <div>
                    <label for="username" class="block text-sm font-medium ts-text-secondary mb-1.5">Username</label>
                    <input id="username" type="text" required autocomplete="username"
                        class="ts-input w-full rounded-xl px-4 py-3 text-sm"
                        placeholder="johndoe">
                </div>
                <div>
                    <label for="email" class="block text-sm font-medium ts-text-secondary mb-1.5">Email <span class="ts-text-faint">(optional)</span></label>
                    <input id="email" type="email" autocomplete="email"
                        class="ts-input w-full rounded-xl px-4 py-3 text-sm"
                        placeholder="john@example.com">
                </div>
                <div>
                    <label for="role" class="block text-sm font-medium ts-text-secondary mb-1.5">Role</label>
                    <select id="role" required
                        class="ts-input w-full rounded-xl px-4 py-3 text-sm appearance-none cursor-pointer"
                        style="background-image: url('data:image/svg+xml;charset=UTF-8,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 fill=%22none%22 viewBox=%220 0 24 24%22 stroke=%22%2394a3b8%22 stroke-width=%222%22%3E%3Cpath stroke-linecap=%22round%22 stroke-linejoin=%22round%22 d=%22M19 9l-7 7-7-7%22/%3E%3C/svg%3E'); background-repeat: no-repeat; background-position: right 12px center; background-size: 18px;">
                        <option value="" disabled selected style="background: var(--color-select-option-bg);">Select your role</option>
                        <option value="EMPLOYEE" style="background: var(--color-select-option-bg);">Employee</option>
                        <option value="MANAGER" style="background: var(--color-select-option-bg);">Line Manager</option>
                        <option value="PAYROLL" style="background: var(--color-select-option-bg);">Payroll Officer</option>
                    </select>
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium ts-text-secondary mb-1.5">Password</label>
                    <input id="password" type="password" required autocomplete="new-password"
                        class="ts-input w-full rounded-xl px-4 py-3 text-sm"
                        placeholder="Min. 8 characters">
                </div>
                <div>
                    <label for="password2" class="block text-sm font-medium ts-text-secondary mb-1.5">Confirm Password</label>
                    <input id="password2" type="password" required autocomplete="new-password"
                        class="ts-input w-full rounded-xl px-4 py-3 text-sm"
                        placeholder="Re-enter your password">
                </div>
                <button
                    id="signupBtn"
                    type="submit"
                    class="ts-btn-primary w-full font-semibold py-3 rounded-xl text-sm flex items-center justify-center gap-2 mt-2"
                >
                    <span id="signupBtnText">Create Account</span>
                    <svg id="signupSpinner" class="hidden animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                </button>
            </form>

            <div class="mt-6 text-center">
                <span class="ts-text-faint text-sm">Already have an account?</span>
                <a href="login.html" class="text-sm font-medium ml-1 transition-colors" style="color: var(--color-accent-text);">Sign in</a>
            </div>
        </div>

        <p class="text-center ts-text-footer text-xs mt-6">&copy; 2026 TimeSync. All rights reserved.</p>
    </div>

    <script src="js/toast.js?v=3"></script>
    <script src="js/auth.js?v=3"></script>
    <script src="js/services.js?v=3"></script>
    <script>
        (function () {
            'use strict';

            /* If already logged in, redirect */
            if (window.auth.isAuthenticated()) {
                var user = window.auth.getUser();
                if (user && user.role) {
                    window.location.href = window.auth.getDashboardPath(user.role);
                    return;
                }
            }

            var form = document.getElementById('signupForm');
            var btnText = document.getElementById('signupBtnText');
            var spinner = document.getElementById('signupSpinner');
            var btn = document.getElementById('signupBtn');

            form.addEventListener('submit', async function (e) {
                e.preventDefault();

                var password = document.getElementById('password').value;
                var password2 = document.getElementById('password2').value;

                if (password !== password2) {
                    showToast('Passwords do not match.', 'error');
                    return;
                }

                if (password.length < 8) {
                    showToast('Password must be at least 8 characters.', 'warning');
                    return;
                }

                var payload = {
                    first_name: document.getElementById('firstName').value.trim(),
                    last_name: document.getElementById('lastName').value.trim(),
                    username: document.getElementById('username').value.trim(),
                    email: document.getElementById('email').value.trim(),
                    role: document.getElementById('role').value,
                    password: password,
                    password2: password2,
                };

                btn.disabled = true;
                btnText.textContent = 'Creating account…';
                spinner.classList.remove('hidden');

                try {
                    if (!window.api || typeof window.api.register !== 'function') {
                        throw new Error('API module failed to load. Please refresh the page.');
                    }

                    var result = await window.api.register(payload);

                    if (result.success) {
                        showToast('Account created! Redirecting…', 'success');
                        var role = result.data.user.role;
                        setTimeout(function () {
                            window.location.href = window.auth.getDashboardPath(role);
                        }, 600);
                        return; // Keep button in loading state during redirect
                    } else {
                        showToast(result.error || 'Registration failed.', 'error');
                    }
                } catch (err) {
                    console.error('[TimeSync] Signup form error:', err);
                    var msg = (err && err.message) ? err.message : 'An unexpected error occurred.';
                    if (typeof showToast === 'function') {
                        showToast(msg, 'error');
                    } else {
                        alert('Signup error: ' + msg);
                    }
                }

                /* Reset button on failure */
                btn.disabled = false;
                btnText.textContent = 'Create Account';
                spinner.classList.add('hidden');
            });
        })();
    </script>
</body>
</html>
