<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Dashboard — TimeSync</title>
    <meta name="description" content="View your personal overtime requests and submit new ones.">
    <script src="../js/theme.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/theme.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="ts-nav sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background: var(--color-accent-bg); border: 1px solid var(--color-accent-border);">
                        <svg class="w-4 h-4" style="color: var(--color-accent-text);" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6l4 2m6-2a10 10 0 11-20 0 10 10 0 0120 0z"/>
                        </svg>
                    </div>
                    <span class="text-lg font-bold tracking-tight ts-text-primary">TimeSync</span>
                    <span class="hidden sm:inline-flex px-2.5 py-0.5 text-[10px] font-medium rounded-full uppercase tracking-wider" style="background: var(--color-accent-bg); color: var(--color-accent-text); border: 1px solid var(--color-accent-border);">Employee</span>
                </div>
                <div class="flex items-center gap-3">
                    <span id="navUserName" class="text-sm ts-text-secondary hidden sm:block"></span>
                    <button onclick="window.tsTheme.toggle()" class="theme-toggle" aria-label="Toggle theme">
                        <svg class="icon-sun" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m8.66-13.66l-.71.71M4.05 19.95l-.71.71M21 12h-1M4 12H3m16.66 7.66l-.71-.71M4.05 4.05l-.71-.71M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                        <svg class="icon-moon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                    </button>
                    <button onclick="window.auth.logout()" class="text-sm ts-text-muted hover:ts-text-primary transition-colors flex items-center gap-1.5" style="color: var(--color-text-muted);">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                        </svg>
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8 fade-in">

        <!-- Submit Overtime Card -->
        <div class="ts-card p-6 mb-8">
            <h2 class="text-lg font-semibold ts-text-primary mb-4 flex items-center gap-2">
                <svg class="w-5 h-5" style="color: var(--color-accent-text);" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
                </svg>
                Submit Overtime Request
            </h2>
            <form id="submitOvertimeForm" class="grid grid-cols-1 sm:grid-cols-4 gap-4 items-end">
                <div>
                    <label for="otDate" class="block text-sm font-medium ts-text-muted mb-1.5">Date</label>
                    <input id="otDate" type="date" required
                        class="ts-input w-full rounded-xl px-4 py-2.5 text-sm">
                </div>
                <div>
                    <label for="otHours" class="block text-sm font-medium ts-text-muted mb-1.5">Hours</label>
                    <input id="otHours" type="number" step="0.5" min="0.5" max="24" required
                        class="ts-input w-full rounded-xl px-4 py-2.5 text-sm"
                        placeholder="e.g. 2.5">
                </div>
                <div>
                    <label for="otReason" class="block text-sm font-medium ts-text-muted mb-1.5">Reason</label>
                    <input id="otReason" type="text" required
                        class="ts-input w-full rounded-xl px-4 py-2.5 text-sm"
                        placeholder="Business reason for overtime…">
                </div>
                <button id="submitOtBtn" type="submit"
                    class="ts-btn-primary font-semibold py-2.5 rounded-xl text-sm flex items-center justify-center gap-2">
                    <span id="submitOtBtnText">Submit Request</span>
                    <svg id="submitOtSpinner" class="hidden animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                </button>
            </form>
        </div>

        <!-- Requests Table -->
        <div class="ts-card overflow-hidden">
            <div class="px-6 py-4" style="border-bottom: 1px solid var(--color-border);">
                <h2 class="text-lg font-semibold ts-text-primary">My Overtime Requests</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full">
                    <thead>
                        <tr style="border-bottom: 1px solid var(--color-border);">
                            <th class="px-6 py-3 text-left text-xs font-medium ts-text-faint uppercase tracking-wider">Date</th>
                            <th class="px-6 py-3 text-left text-xs font-medium ts-text-faint uppercase tracking-wider">Hours</th>
                            <th class="px-6 py-3 text-left text-xs font-medium ts-text-faint uppercase tracking-wider">Reason</th>
                            <th class="px-6 py-3 text-left text-xs font-medium ts-text-faint uppercase tracking-wider">Status</th>
                        </tr>
                    </thead>
                    <tbody id="overtimeTableBody"></tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div id="paginationContainer" class="hidden px-6 py-3 flex items-center justify-between" style="border-top: 1px solid var(--color-border);">
                <p class="text-sm ts-text-faint">
                    Showing <span class="font-medium ts-text-secondary" id="pageStart">1</span> to <span class="font-medium ts-text-secondary" id="pageEnd">10</span> of <span class="font-medium ts-text-secondary" id="pageTotal">0</span>
                </p>
                <div class="inline-flex">
                    <button id="prevPageBtn" onclick="window.employeeDash.changePage(-1)" class="px-3 py-2 rounded-l-lg text-sm transition-colors" style="border: 1px solid var(--color-btn-secondary-border); background: var(--color-btn-secondary-bg); color: var(--color-btn-secondary-text);">Previous</button>
                    <button id="nextPageBtn" onclick="window.employeeDash.changePage(1)" class="px-3 py-2 rounded-r-lg text-sm transition-colors" style="border: 1px solid var(--color-btn-secondary-border); background: var(--color-btn-secondary-bg); color: var(--color-btn-secondary-text);">Next</button>
                </div>
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="hidden py-16 text-center">
                <svg class="mx-auto w-12 h-12 ts-text-faint mb-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
                </svg>
                <p class="ts-text-faint text-sm">No overtime requests yet. Submit one above!</p>
            </div>
        </div>
    </main>

    <!-- Reason Modal -->
    <div id="reasonModal" class="hidden fixed inset-0 z-50 overflow-y-auto" role="dialog" aria-modal="true">
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="fixed inset-0 backdrop-blur-sm" style="background: var(--color-bg-modal-overlay);" onclick="window.employeeDash.closeModal()"></div>
            <div class="relative ts-card max-w-md w-full p-6 shadow-2xl">
                <h3 class="text-lg font-semibold ts-text-primary mb-4">Overtime Details</h3>
                <div class="space-y-2 text-sm mb-4">
                    <p><span class="ts-text-muted">Date:</span> <span id="modalDate" class="ts-text-primary ml-2"></span></p>
                    <p><span class="ts-text-muted">Hours:</span> <span id="modalHours" class="ts-text-primary ml-2"></span></p>
                </div>
                <div>
                    <p class="text-sm font-medium ts-text-muted mb-1">Reason:</p>
                    <p id="modalReasonText" class="text-sm ts-text-secondary whitespace-pre-wrap break-words rounded-xl p-4" style="background: var(--color-bg-input);"></p>
                </div>
                <div class="mt-6">
                    <button onclick="window.employeeDash.closeModal()" class="w-full py-2.5 rounded-xl text-sm font-medium ts-text-secondary transition-colors" style="border: 1px solid var(--color-border);">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/toast.js?v=3"></script>
    <script src="../js/auth.js?v=3"></script>
    <script src="../js/services.js?v=3"></script>
    <script src="../js/employee.js?v=3"></script>
</body>
</html>
