<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payroll Dashboard — TimeSync</title>
    <meta name="description" content="View approved timesheets, calculate pay scaling, and track payroll statistics.">
    <script src="../js/theme.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/theme.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="ts-nav sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background: var(--color-badge-approved-bg); border: 1px solid var(--color-badge-approved-border);">
                        <svg class="w-4 h-4" style="color: var(--color-badge-approved-text);" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6l4 2m6-2a10 10 0 11-20 0 10 10 0 0120 0z"/>
                        </svg>
                    </div>
                    <span class="text-lg font-bold tracking-tight ts-text-primary">TimeSync</span>
                    <span class="hidden sm:inline-flex px-2.5 py-0.5 text-[10px] font-medium rounded-full uppercase tracking-wider" style="background: var(--color-badge-approved-bg); color: var(--color-badge-approved-text); border: 1px solid var(--color-badge-approved-border);">Payroll</span>
                </div>
                <div class="flex items-center gap-3">
                    <span id="navUserName" class="text-sm ts-text-secondary hidden sm:block"></span>
                    <button onclick="window.tsTheme.toggle()" class="theme-toggle" aria-label="Toggle theme">
                        <svg class="icon-sun" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m8.66-13.66l-.71.71M4.05 19.95l-.71.71M21 12h-1M4 12H3m16.66 7.66l-.71-.71M4.05 4.05l-.71-.71M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                        <svg class="icon-moon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                    </button>
                    <button onclick="window.auth.logout()" class="text-sm transition-colors flex items-center gap-1.5" style="color: var(--color-text-muted);">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                        </svg>
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8 fade-in">

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="ts-card p-5">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background: var(--color-badge-approved-bg); border: 1px solid var(--color-badge-approved-border);">
                        <svg class="w-5 h-5" style="color: var(--color-badge-approved-text);" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-xs ts-text-faint uppercase tracking-wider">Approved</p>
                        <p id="statApprovedCount" class="text-2xl font-bold ts-text-primary">0</p>
                    </div>
                </div>
            </div>
            <div class="ts-card p-5">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background: var(--color-accent-bg); border: 1px solid var(--color-accent-border);">
                        <svg class="w-5 h-5" style="color: var(--color-accent-text);" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-xs ts-text-faint uppercase tracking-wider">Total Hours</p>
                        <p id="statTotalHours" class="text-2xl font-bold ts-text-primary">0.0</p>
                    </div>
                </div>
            </div>
            <div class="ts-card p-5">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background: var(--color-accent-bg); border: 1px solid var(--color-accent-border);">
                        <svg class="w-5 h-5" style="color: var(--color-accent-text);" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-xs ts-text-faint uppercase tracking-wider">Employees</p>
                        <p id="statUniqueEmployees" class="text-2xl font-bold ts-text-primary">0</p>
                    </div>
                </div>
            </div>
            <div class="ts-card p-5">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background: var(--color-badge-pending-bg); border: 1px solid var(--color-badge-pending-border);">
                        <svg class="w-5 h-5" style="color: var(--color-badge-pending-text);" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-xs ts-text-faint uppercase tracking-wider">Est. Payout</p>
                        <p id="statTotalPayout" class="text-2xl font-bold ts-text-primary">₱0.00</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Approved Timesheets Table -->
        <div class="ts-card overflow-hidden">
            <div class="px-6 py-4 flex items-center justify-between" style="border-bottom: 1px solid var(--color-border);">
                <h2 class="text-lg font-semibold ts-text-primary">Approved Timesheets</h2>
                <span class="text-xs ts-text-faint">Rate: ₱250.00/hr × 1.5 OT</span>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full">
                    <thead>
                        <tr style="border-bottom: 1px solid var(--color-border);">
                            <th class="px-6 py-3 text-left text-xs font-medium ts-text-faint uppercase tracking-wider">Employee</th>
                            <th class="px-6 py-3 text-left text-xs font-medium ts-text-faint uppercase tracking-wider">Date</th>
                            <th class="px-6 py-3 text-left text-xs font-medium ts-text-faint uppercase tracking-wider">Hours</th>
                            <th class="px-6 py-3 text-left text-xs font-medium ts-text-faint uppercase tracking-wider">OT Pay</th>
                            <th class="px-6 py-3 text-left text-xs font-medium ts-text-faint uppercase tracking-wider">Status</th>
                        </tr>
                    </thead>
                    <tbody id="overtimeTableBody"></tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div id="paginationContainer" class="hidden px-6 py-3 flex items-center justify-between" style="border-top: 1px solid var(--color-border);">
                <p class="text-sm ts-text-faint">
                    Showing <span class="font-medium ts-text-secondary" id="pageStart">1</span> to <span class="font-medium ts-text-secondary" id="pageEnd">10</span> of <span class="font-medium ts-text-secondary" id="pageTotal">0</span>
                </p>
                <div class="inline-flex">
                    <button id="prevPageBtn" onclick="window.payrollDash.changePage(-1)" class="px-3 py-2 rounded-l-lg text-sm transition-colors" style="border: 1px solid var(--color-btn-secondary-border); background: var(--color-btn-secondary-bg); color: var(--color-btn-secondary-text);">Previous</button>
                    <button id="nextPageBtn" onclick="window.payrollDash.changePage(1)" class="px-3 py-2 rounded-r-lg text-sm transition-colors" style="border: 1px solid var(--color-btn-secondary-border); background: var(--color-btn-secondary-bg); color: var(--color-btn-secondary-text);">Next</button>
                </div>
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="hidden py-16 text-center">
                <svg class="mx-auto w-12 h-12 ts-text-faint mb-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <p class="ts-text-faint text-sm">No approved timesheets to process.</p>
            </div>
        </div>
    </main>

    <script src="../js/toast.js?v=3"></script>
    <script src="../js/auth.js?v=3"></script>
    <script src="../js/services.js?v=3"></script>
    <script src="../js/payroll.js?v=3"></script>
</body>
</html>
