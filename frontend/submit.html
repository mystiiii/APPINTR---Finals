<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Overtime - TimeSync</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">

    <div class="max-w-md w-full space-y-8 bg-white p-8 border border-gray-200 rounded-lg shadow-sm">
        <div>
            <h2 class="text-center text-2xl font-semibold text-gray-900 tracking-tight">
                Submit Overtime
            </h2>
            <p class="mt-2 text-center text-sm text-gray-500">
                Enter your hours and the business reason.
            </p>
        </div>
        <form class="mt-8 space-y-6" id="submitForm" onsubmit="handleSubmission(event)">
            <div class="rounded-md space-y-4">
                
                <div>
                    <label for="employeeSelect" class="block text-sm font-medium text-gray-700">Identity Selection (Prototype)</label>
                    <select id="employeeSelect" required class="mt-1 block w-full pl-3 pr-10 py-2 border-gray-300 border text-base focus:outline-none focus:ring-1 focus:ring-gray-400 focus:border-gray-400 sm:text-sm rounded-md bg-gray-50">
                        <option value="">Loading identities...</option>
                    </select>
                </div>

                <div>
                    <label for="date" class="block text-sm font-medium text-gray-700">Date of Overtime</label>
                    <input id="date" name="date" type="date" required class="mt-1 block w-full appearance-none rounded-md border border-gray-300 px-3 py-2 text-gray-900 placeholder-gray-500 focus:border-gray-400 focus:outline-none focus:ring-1 focus:ring-gray-400 sm:text-sm">
                </div>

                <div>
                    <label for="hours" class="block text-sm font-medium text-gray-700">Hours Worked</label>
                    <input id="hours" name="hours" type="number" step="0.5" min="0.5" max="24" required class="mt-1 block w-full appearance-none rounded-md border border-gray-300 px-3 py-2 text-gray-900 placeholder-gray-500 focus:border-gray-400 focus:outline-none focus:ring-1 focus:ring-gray-400 sm:text-sm" placeholder="e.g. 2.5">
                </div>

                <div>
                    <label for="reason" class="block text-sm font-medium text-gray-700">Business Reason</label>
                    <textarea id="reason" name="reason" rows="3" required class="mt-1 block w-full appearance-none rounded-md border border-gray-300 px-3 py-2 text-gray-900 placeholder-gray-500 focus:border-gray-400 focus:outline-none focus:ring-1 focus:ring-gray-400 sm:text-sm" placeholder="Explain why overtime was required..."></textarea>
                </div>
            </div>

            <div class="flex items-center justify-between mt-6">
                <a href="index.html" class="text-sm text-gray-600 hover:text-gray-900">Cancel</a>
                <button type="submit" class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-gray-800 hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-600">
                    Submit Request
                </button>
            </div>
            <div id="statusMessage" class="hidden text-sm text-center"></div>
        </form>
    </div>

    <script src="js/api.js"></script>
    <script>
        async function loadEmployees() {
            const select = document.getElementById('employeeSelect');
            const users = await window.api.fetchUsers();
            const employees = users.filter(u => u.role === 'EMPLOYEE');
            
            select.innerHTML = '<option value="" disabled selected>Select Employee</option>';
            employees.forEach(emp => {
                const opt = document.createElement('option');
                opt.value = emp.id;
                opt.textContent = `${emp.first_name} ${emp.last_name} (${emp.username})`;
                select.appendChild(opt);
            });
        }

        async function handleSubmission(event) {
            event.preventDefault();
            const employee_id = document.getElementById('employeeSelect').value;
            const date = document.getElementById('date').value;
            const hours = document.getElementById('hours').value;
            const reason = document.getElementById('reason').value;
            const msgEl = document.getElementById('statusMessage');

            const res = await window.api.submitOvertime({ employee_id, date, hours, reason });

            msgEl.classList.remove('hidden');
            if (res && res.id) {
                msgEl.classList.add('text-green-600');
                msgEl.textContent = "Overtime request submitted successfully!";
                document.getElementById('submitForm').reset();
                setTimeout(() => window.location.href = 'index.html', 1500);
            } else {
                msgEl.classList.add('text-red-500');
                msgEl.textContent = "Failed to submit request. Check console.";
            }
        }

        document.addEventListener('DOMContentLoaded', loadEmployees);
    </script>
</body>
</html>
