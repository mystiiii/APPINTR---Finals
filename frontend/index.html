<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeSync Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen">

    <!-- Navigation -->
    <nav class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <h1 class="text-xl font-semibold text-gray-800 tracking-tight">TimeSync</h1>
                </div>
                <!-- Role Switcher -->
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-gray-500">Simulate Login As:</span>
                    <select id="userRoleSelect" class="block w-auto min-w-[12rem] pl-3 pr-10 py-2 text-base border-gray-300 bg-gray-50 focus:outline-none focus:ring-1 focus:ring-gray-400 focus:border-gray-400 sm:text-sm rounded-md border">
                        <!-- Options populated by JS -->
                    </select>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
        
        <!-- Header Section -->
        <div class="md:flex md:items-center md:justify-between mb-6">
            <div class="flex-1 min-w-0">
                <h2 id="viewTitle" class="text-2xl font-medium leading-7 text-gray-900 sm:text-3xl sm:truncate">
                    Overtime Requests
                </h2>
            </div>
            <div id="actionButtons" class="mt-4 flex md:mt-0 md:ml-4">
                <!-- Action buttons appended by JS (e.g. submit button for Employee) -->
            </div>
        </div>

        <!-- Data Table Container -->
        <div class="flex flex-col">
            <div class="-my-2 overflow-x-auto sm:-mx-6 lg:-mx-8">
                <div class="py-2 align-middle inline-block min-w-full sm:px-6 lg:px-8">
                    <div class="shadow overflow-hidden border-b border-gray-200 sm:rounded-lg">
                        <table class="min-w-full divide-y divide-gray-200 bg-white">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Employee</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Date</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Hours</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Reason</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                                    <th id="actionHeader" scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider hidden">Action</th>
                                </tr>
                            </thead>
                            <tbody id="overtimeTableBody" class="divide-y divide-gray-200">
                                <!-- Populated dynamically based on role view -->
                            </tbody>
                        </table>
                        
                        <!-- Pagination Container -->
                        <div id="paginationContainer" class="hidden bg-white px-4 py-3 border-t border-gray-200 flex items-center justify-between sm:px-6">
                            <div class="flex-1 flex items-center justify-between">
                                <div>
                                    <p class="text-sm text-gray-700">
                                        Showing <span class="font-medium" id="pageStart">1</span> to <span class="font-medium" id="pageEnd">5</span> of <span class="font-medium" id="pageTotal">5</span> results
                                    </p>
                                </div>
                                <div>
                                    <nav class="relative z-0 inline-flex rounded-md shadow-sm -space-x-px" aria-label="Pagination">
                                        <button id="prevPageBtn" onclick="changePage(-1)" class="relative inline-flex items-center px-3 py-2 rounded-l-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">
                                            Previous
                                        </button>
                                        <button id="nextPageBtn" onclick="changePage(1)" class="relative inline-flex items-center px-3 py-2 rounded-r-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">
                                            Next
                                        </button>
                                    </nav>
                                </div>
                            </div>
                        </div>

                        <!-- Empty State -->
                        <div id="emptyState" class="hidden py-10 text-center text-gray-500 text-sm">
                            No records found.
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Reason Modal -->
    <div id="reasonModal" class="hidden fixed inset-0 z-50 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-center justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:p-0">
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true" onclick="closeReasonModal()"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div class="inline-block align-bottom bg-white rounded-lg px-4 pt-5 pb-4 text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full sm:p-6">
                <div>
                    <h3 class="text-lg leading-6 font-medium text-gray-900" id="modal-title">Overtime Reason</h3>
                    <div class="mt-4 border-b pb-4 mb-4 text-sm text-gray-600">
                        <p><span class="font-medium text-gray-900 mr-2">Employee:</span> <span id="modalEmpName"></span></p>
                        <p><span class="font-medium text-gray-900 mr-2">Date:</span> <span id="modalDate"></span></p>
                        <p><span class="font-medium text-gray-900 mr-2">Hours:</span> <span id="modalHours"></span></p>
                    </div>
                    <div>
                        <p class="text-sm font-medium text-gray-900 mb-1">Reason:</p>
                        <p class="text-sm text-gray-700 whitespace-pre-wrap break-words" id="modalReasonText"></p>
                    </div>
                </div>
                <div class="mt-5 sm:mt-6">
                    <button type="button" class="inline-flex justify-center w-full rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none sm:text-sm" onclick="closeReasonModal()">
                        Close
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
