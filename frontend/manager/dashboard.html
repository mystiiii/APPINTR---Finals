<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Dashboard — TimeSync</title>
    <meta name="description" content="Review and manage pending overtime approval requests.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .glass-nav {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .fade-in { animation: fadeInUp 0.4s ease-out both; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="gradient-bg text-white">

    <!-- Navigation -->
    <nav class="glass-nav sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-amber-500/20 border border-amber-500/30 flex items-center justify-center">
                        <svg class="w-4 h-4 text-amber-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6l4 2m6-2a10 10 0 11-20 0 10 10 0 0120 0z"/>
                        </svg>
                    </div>
                    <span class="text-lg font-bold text-white tracking-tight">TimeSync</span>
                    <span class="hidden sm:inline-flex px-2.5 py-0.5 text-[10px] font-medium rounded-full bg-amber-500/10 text-amber-400 border border-amber-500/20 uppercase tracking-wider">Manager</span>
                </div>
                <div class="flex items-center gap-4">
                    <span id="navUserName" class="text-sm text-slate-300 hidden sm:block"></span>
                    <button onclick="window.auth.logout()" class="text-sm text-slate-400 hover:text-white transition-colors flex items-center gap-1.5">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                        </svg>
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8 fade-in">

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">
            <div class="glass-card rounded-2xl p-5">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-amber-500/10 border border-amber-500/20 flex items-center justify-center">
                        <svg class="w-5 h-5 text-amber-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-xs text-slate-500 uppercase tracking-wider">Pending Requests</p>
                        <p id="statPendingCount" class="text-2xl font-bold text-white">0</p>
                    </div>
                </div>
            </div>
            <div class="glass-card rounded-2xl p-5">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-indigo-500/10 border border-indigo-500/20 flex items-center justify-center">
                        <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-xs text-slate-500 uppercase tracking-wider">Total OT Hours</p>
                        <p id="statTotalHours" class="text-2xl font-bold text-white">0.0</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Requests Table -->
        <div class="glass-card rounded-2xl overflow-hidden">
            <div class="px-6 py-4 border-b border-white/5">
                <h2 class="text-lg font-semibold text-white">Pending Approvals</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full">
                    <thead>
                        <tr class="border-b border-white/5">
                            <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Employee</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Date</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Hours</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Reason</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-slate-500 uppercase tracking-wider">Action</th>
                        </tr>
                    </thead>
                    <tbody id="overtimeTableBody"></tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div id="paginationContainer" class="hidden px-6 py-3 border-t border-white/5 flex items-center justify-between">
                <p class="text-sm text-slate-500">
                    Showing <span class="font-medium text-slate-300" id="pageStart">1</span> to <span class="font-medium text-slate-300" id="pageEnd">10</span> of <span class="font-medium text-slate-300" id="pageTotal">0</span>
                </p>
                <div class="inline-flex">
                    <button id="prevPageBtn" onclick="window.managerDash.changePage(-1)" class="px-3 py-2 rounded-l-lg border border-slate-700 bg-slate-800 text-sm text-slate-300 hover:bg-slate-700 transition-colors">Previous</button>
                    <button id="nextPageBtn" onclick="window.managerDash.changePage(1)" class="px-3 py-2 rounded-r-lg border border-slate-700 bg-slate-800 text-sm text-slate-300 hover:bg-slate-700 transition-colors">Next</button>
                </div>
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="hidden py-16 text-center">
                <svg class="mx-auto w-12 h-12 text-slate-600 mb-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <p class="text-slate-500 text-sm">All caught up! No pending requests.</p>
            </div>
        </div>
    </main>

    <!-- Reason Modal -->
    <div id="reasonModal" class="hidden fixed inset-0 z-50 overflow-y-auto" role="dialog" aria-modal="true">
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="fixed inset-0 bg-black/60 backdrop-blur-sm" onclick="window.managerDash.closeModal()"></div>
            <div class="relative glass-card rounded-2xl max-w-md w-full p-6 shadow-2xl" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);">
                <h3 class="text-lg font-semibold text-white mb-4">Overtime Details</h3>
                <div class="space-y-2 text-sm mb-4">
                    <p><span class="text-slate-400">Employee:</span> <span id="modalEmpName" class="text-white ml-2"></span></p>
                    <p><span class="text-slate-400">Date:</span> <span id="modalDate" class="text-white ml-2"></span></p>
                    <p><span class="text-slate-400">Hours:</span> <span id="modalHours" class="text-white ml-2"></span></p>
                </div>
                <div>
                    <p class="text-sm font-medium text-slate-400 mb-1">Reason:</p>
                    <p id="modalReasonText" class="text-sm text-slate-200 whitespace-pre-wrap break-words bg-white/5 rounded-xl p-4"></p>
                </div>
                <div class="mt-6">
                    <button onclick="window.managerDash.closeModal()" class="w-full py-2.5 rounded-xl border border-white/10 text-sm font-medium text-slate-300 hover:bg-white/5 transition-colors">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/toast.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/manager.js"></script>
</body>
</html>
