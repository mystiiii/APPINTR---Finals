<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Dashboard — TimeSync</title>
    <meta name="description" content="Review and manage pending overtime approval requests.">
    <script src="../js/theme.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/theme.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="ts-nav sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background: var(--color-badge-pending-bg); border: 1px solid var(--color-badge-pending-border);">
                        <svg class="w-4 h-4" style="color: var(--color-badge-pending-text);" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6l4 2m6-2a10 10 0 11-20 0 10 10 0 0120 0z"/>
                        </svg>
                    </div>
                    <span class="text-lg font-bold tracking-tight ts-text-primary">TimeSync</span>
                    <span class="hidden sm:inline-flex px-2.5 py-0.5 text-[10px] font-medium rounded-full uppercase tracking-wider" style="background: var(--color-badge-pending-bg); color: var(--color-badge-pending-text); border: 1px solid var(--color-badge-pending-border);">Manager</span>
                </div>
                <div class="flex items-center gap-3">
                    <span id="navUserName" class="text-sm ts-text-secondary hidden sm:block"></span>
                    <button onclick="window.tsTheme.toggle()" class="theme-toggle" aria-label="Toggle theme">
                        <svg class="icon-sun" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m8.66-13.66l-.71.71M4.05 19.95l-.71.71M21 12h-1M4 12H3m16.66 7.66l-.71-.71M4.05 4.05l-.71-.71M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                        <svg class="icon-moon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                    </button>
                    <button onclick="window.auth.logout()" class="text-sm transition-colors flex items-center gap-1.5" style="color: var(--color-text-muted);">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                        </svg>
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8 fade-in">

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">
            <div class="ts-card p-5">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background: var(--color-badge-pending-bg); border: 1px solid var(--color-badge-pending-border);">
                        <svg class="w-5 h-5" style="color: var(--color-badge-pending-text);" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-xs ts-text-faint uppercase tracking-wider">Pending Requests</p>
                        <p id="statPendingCount" class="text-2xl font-bold ts-text-primary">0</p>
                    </div>
                </div>
            </div>
            <div class="ts-card p-5">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background: var(--color-accent-bg); border: 1px solid var(--color-accent-border);">
                        <svg class="w-5 h-5" style="color: var(--color-accent-text);" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-xs ts-text-faint uppercase tracking-wider">Total OT Hours</p>
                        <p id="statTotalHours" class="text-2xl font-bold ts-text-primary">0.0</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Requests Table -->
        <div class="ts-card overflow-hidden">
            <div class="px-6 py-4" style="border-bottom: 1px solid var(--color-border);">
                <h2 class="text-lg font-semibold ts-text-primary">Pending Approvals</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full">
                    <thead>
                        <tr style="border-bottom: 1px solid var(--color-border);">
                            <th class="px-6 py-3 text-left text-xs font-medium ts-text-faint uppercase tracking-wider">Employee</th>
                            <th class="px-6 py-3 text-left text-xs font-medium ts-text-faint uppercase tracking-wider">Date</th>
                            <th class="px-6 py-3 text-left text-xs font-medium ts-text-faint uppercase tracking-wider">Hours</th>
                            <th class="px-6 py-3 text-left text-xs font-medium ts-text-faint uppercase tracking-wider">Reason</th>
                            <th class="px-6 py-3 text-right text-xs font-medium ts-text-faint uppercase tracking-wider">Action</th>
                        </tr>
                    </thead>
                    <tbody id="overtimeTableBody"></tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div id="paginationContainer" class="hidden px-6 py-3 flex items-center justify-between" style="border-top: 1px solid var(--color-border);">
                <p class="text-sm ts-text-faint">
                    Showing <span class="font-medium ts-text-secondary" id="pageStart">1</span> to <span class="font-medium ts-text-secondary" id="pageEnd">10</span> of <span class="font-medium ts-text-secondary" id="pageTotal">0</span>
                </p>
                <div class="inline-flex">
                    <button id="prevPageBtn" onclick="window.managerDash.changePage(-1)" class="px-3 py-2 rounded-l-lg text-sm transition-colors" style="border: 1px solid var(--color-btn-secondary-border); background: var(--color-btn-secondary-bg); color: var(--color-btn-secondary-text);">Previous</button>
                    <button id="nextPageBtn" onclick="window.managerDash.changePage(1)" class="px-3 py-2 rounded-r-lg text-sm transition-colors" style="border: 1px solid var(--color-btn-secondary-border); background: var(--color-btn-secondary-bg); color: var(--color-btn-secondary-text);">Next</button>
                </div>
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="hidden py-16 text-center">
                <svg class="mx-auto w-12 h-12 ts-text-faint mb-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <p class="ts-text-faint text-sm">All caught up! No pending requests.</p>
            </div>
        </div>
    </main>

    <!-- Reason Modal -->
    <div id="reasonModal" class="hidden fixed inset-0 z-50 overflow-y-auto" role="dialog" aria-modal="true">
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="fixed inset-0 backdrop-blur-sm" style="background: var(--color-bg-modal-overlay);" onclick="window.managerDash.closeModal()"></div>
            <div class="relative ts-card max-w-md w-full p-6 shadow-2xl">
                <h3 class="text-lg font-semibold ts-text-primary mb-4">Overtime Details</h3>
                <div class="space-y-2 text-sm mb-4">
                    <p><span class="ts-text-muted">Employee:</span> <span id="modalEmpName" class="ts-text-primary ml-2"></span></p>
                    <p><span class="ts-text-muted">Date:</span> <span id="modalDate" class="ts-text-primary ml-2"></span></p>
                    <p><span class="ts-text-muted">Hours:</span> <span id="modalHours" class="ts-text-primary ml-2"></span></p>
                </div>
                <div>
                    <p class="text-sm font-medium ts-text-muted mb-1">Reason:</p>
                    <p id="modalReasonText" class="text-sm ts-text-secondary whitespace-pre-wrap break-words rounded-xl p-4" style="background: var(--color-bg-input);"></p>
                </div>
                <div class="mt-6">
                    <button onclick="window.managerDash.closeModal()" class="w-full py-2.5 rounded-xl text-sm font-medium ts-text-secondary transition-colors" style="border: 1px solid var(--color-border);">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/toast.js?v=3"></script>
    <script src="../js/auth.js?v=3"></script>
    <script src="../js/services.js?v=3"></script>
    <script src="../js/manager.js?v=3"></script>
</body>
</html>
